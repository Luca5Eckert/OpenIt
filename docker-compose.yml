services:
  front:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: openit-front
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - openit_network

  api:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: openit-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - NODE_HOST=nodered
      - NODE_PORT=1880
      - WEBHOOK_URL=${WEBHOOK_URL}
      - MP_ACCESS_TOKEN=${MP_ACCESS_TOKEN}
      - MP_DEFAULT_PAYER_ID=${MP_DEFAULT_PAYER_ID}
      - MP_DEFAULT_PAYER_EMAIL=${MP_DEFAULT_PAYER_EMAIL}
    networks:
      - openit_network
    depends_on:
      nodered:
        condition: service_healthy

  nodered:
    build:
      context: ./nodered
      dockerfile: Dockerfile
    container_name: openit-nodered
    restart: unless-stopped
    ports:
      - "1880:1880"
    networks:
      - openit_network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:1880"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  ngrok:
    image: ngrok/ngrok@sha256:07bd8fa758e73489d3ba5a2fc95d912e0b8359ebfca4a55886e2059c10020da4
    container_name: openit-ngrok
    restart: unless-stopped
    ports:
      - "4040:4040"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command:
      - "http"
      - "api:8080"
    networks:
      - openit_network
    depends_on:
      - api

networks:
  openit_network:
    driver: bridge