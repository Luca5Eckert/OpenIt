version: '3.8'
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: libera-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - NODE_HOST=${NODE_HOST}
      - NODE_PORT=${NODE_PORT}
      - WEBHOOK_URL=${MERCADOPAGO_WEBHOOK_URL}
    networks:
      - libera_network


  ngrok:
    image: ngrok/ngrok:latest
    container_name: libera-ngrok
    restart: unless-stopped
    ports:
      - "4040:4040"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command:
      - "http"
      - "api:8080"
    networks:
      - libera_network
    depends_on:
      - api

networks:
  libera_network:
    driver: bridge