<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liberação de Saída</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Oculta as setas nativas do input de número */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center font-sans antialiased text-gray-900 selection:bg-black selection:text-white">

    <main class="bg-white border border-gray-200 shadow-xl rounded-lg w-full max-w-md p-8 relative overflow-hidden">
        
        <header class="text-center mb-8 pb-6 border-b border-gray-100">
            <h1 class="text-2xl font-bold tracking-tight text-black">Terminal de Saída</h1>
            <p class="text-sm text-gray-500 mt-1">Validação de ticket de estacionamento</p>
        </header>

        <div id="input-view" class="block transition-opacity duration-300">
            <form id="exit-form" class="space-y-6">
                
                <div>
                    <label for="code-input" class="block text-xs font-semibold uppercase tracking-wider text-gray-600 mb-2">
                        Código do Ticket
                    </label>
                    <input 
                        type="number" 
                        id="code-input" 
                        required
                        placeholder="Ex: 001234"
                        class="w-full text-center text-4xl font-bold p-4 border-2 border-gray-300 rounded-md focus:border-black focus:ring-0 transition-colors outline-none placeholder-gray-200"
                        autocomplete="off"
                        autofocus
                    >
                </div>

                <p id="error-message" class="text-red-600 text-sm font-medium text-center hidden"></p>

                <button 
                    type="submit" 
                    id="submit-btn"
                    class="w-full bg-black hover:bg-gray-800 text-white font-semibold py-4 rounded-md transition-colors flex justify-center items-center gap-2"
                >
                    <span id="btn-text">Liberar Cancela</span>
                    <svg id="loading-spinner" class="animate-spin h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </form>
        </div>

        <div id="success-view" class="hidden opacity-0 transition-opacity duration-300 flex flex-col items-center">
            
            <div class="w-16 h-16 bg-black text-white rounded-full flex items-center justify-center mb-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            
            <h2 class="text-2xl font-bold text-black mb-1">Cancela Aberta</h2>
            <p class="text-sm text-gray-500 mb-8">Pode prosseguir com o veículo.</p>

            <div class="w-full bg-gray-50 border border-gray-200 rounded-md p-4 space-y-4 text-sm mb-8">
                <div class="flex justify-between border-b border-gray-200 pb-2">
                    <span class="text-gray-500">Ticket ID</span>
                    <span id="res-id" class="font-bold text-black">--</span>
                </div>
                <div class="flex justify-between border-b border-gray-200 pb-2">
                    <span class="text-gray-500">Entrada</span>
                    <span id="res-entry" class="font-medium text-black">--</span>
                </div>
                <div class="flex justify-between border-b border-gray-200 pb-2">
                    <span class="text-gray-500">Saída</span>
                    <span id="res-exit" class="font-medium text-black">--</span>
                </div>
                <div class="flex justify-between pt-1">
                    <span class="font-bold text-black">Tempo Total</span>
                    <span id="res-time" class="font-bold text-black">--</span>
                </div>
            </div>

            <button 
                onclick="resetForm()"
                class="w-full bg-white border-2 border-black text-black hover:bg-gray-50 font-semibold py-3 rounded-md transition-colors"
            >
                Validar Novo Ticket
            </button>
        </div>

    </main>

    <script>
        // Configuração da API Real
        const API_URL = 'http://localhost:8080/access/exit';

        // Elementos do DOM
        const form = document.getElementById('exit-form');
        const inputView = document.getElementById('input-view');
        const successView = document.getElementById('success-view');
        const codeInput = document.getElementById('code-input');
        const errorMessage = document.getElementById('error-message');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const loadingSpinner = document.getElementById('loading-spinner');

        // Formatação de data/hora (Ex: 23 Fev 2026, 19:40)
        const formatDate = (isoString) => {
            if (!isoString) return '--';
            const date = new Date(isoString + "Z"); // <-- Ajuste aqui ("Z" indica UTC)
            return date.toLocaleString('pt-PT', { 
                timeZone: 'America/Sao_Paulo',      // <-- Ajuste aqui (força fuso de Brasília)
                day: '2-digit', month: 'short', year: 'numeric', 
                hour: '2-digit', minute:'2-digit' 
            });
        };

        // Cálculo da diferença de tempo
        const calculateTimeSpent = (entryIso, exitIso) => {
            if (!entryIso || !exitIso) return '--';
            const entry = new Date(entryIso + "Z"); // <-- Ajuste aqui ("Z" indica UTC)
            const exit = new Date(exitIso + "Z");   // <-- Ajuste aqui ("Z" indica UTC)
            const diffMs = exit - entry; // Diferença em milissegundos

            if (diffMs < 0) return "Erro no cálculo";

            const diffHrs = Math.floor(diffMs / (1000 * 60 * 60));
            const diffMins = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));

            if (diffHrs === 0) {
                return `${diffMins} min`;
            }
            return `${diffHrs}h e ${diffMins} min`;
        };

        // Alternar visualizações
        const showSuccess = (data) => {
            // Preencher os dados recebidos da API
            document.getElementById('res-id').textContent = `#${data.id.toString().padStart(4, '0')}`;
            document.getElementById('res-entry').textContent = formatDate(data.entryDate);
            document.getElementById('res-exit').textContent = formatDate(data.exitDate);
            document.getElementById('res-time').textContent = calculateTimeSpent(data.entryDate, data.exitDate);

            // Animação de troca de ecrã
            inputView.classList.add('hidden');
            successView.classList.remove('hidden');
            
            setTimeout(() => {
                successView.classList.remove('opacity-0');
            }, 50);
        };

        const resetForm = () => {
            codeInput.value = '';
            errorMessage.classList.add('hidden');
            
            successView.classList.add('opacity-0');
            setTimeout(() => {
                successView.classList.add('hidden');
                inputView.classList.remove('hidden');
                codeInput.focus();
            }, 300);
        };

        // Lidar com o estado de loading
        const setLoading = (isLoading) => {
            if (isLoading) {
                btnText.textContent = "A processar...";
                loadingSpinner.classList.remove('hidden');
                submitBtn.disabled = true;
                submitBtn.classList.add('opacity-80', 'cursor-not-allowed');
            } else {
                btnText.textContent = "Liberar Cancela";
                loadingSpinner.classList.add('hidden');
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-80', 'cursor-not-allowed');
            }
        };

        // Envio do formulário para o Back-end real
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.classList.add('hidden');
            
            const codeValue = parseInt(codeInput.value, 10);
            if (isNaN(codeValue)) return;

            setLoading(true);

            try {
                // Chamada real à API Spring Boot
                const response = await fetch(API_URL, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ code: codeValue })
                });

                if (!response.ok) {
                    throw new Error('Ticket inválido ou erro no servidor.');
                }

                const data = await response.json();
                
                // Exibe o sucesso com os dados da API
                showSuccess(data);

            } catch (error) {
                // Em caso de erro de CORS, aparecerá como um "TypeError: Failed to fetch"
                errorMessage.textContent = error.message === 'Failed to fetch' 
                    ? "Erro de conexão. Verifique se a API está a correr e se o CORS está ativado no Spring Boot." 
                    : error.message;
                errorMessage.classList.remove('hidden');
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>
</html>
