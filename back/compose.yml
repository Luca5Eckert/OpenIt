services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: libera-api
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - NODE_HOST=${NODE_HOST}
      - NODE_PORT=${NODE_PORT}
    ports:
      - "${APP_PORT}:8080"
    networks:
      - libera_network

networks:
  libera_network:
    driver: bridge